<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Murottal Looper + Counter</title>
    <style>
        :root { --primary: #4caf50; --bg: #121212; --card: #1e1e1e; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 600px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        #videoWrapper { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 20px; display: none; }
        video { width: 100%; display: block; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9em; color: #aaa; }
        select, input { width: 100%; padding: 14px; background: #2a2a2a; border: 1px solid #333; border-radius: 10px; color: white; font-size: 16px; box-sizing: border-box; }
        
        /* Styling untuk Counter */
        .counter-badge {
            text-align: center;
            background: #2e7d32;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            display: none; /* Muncul hanya saat surah dipilih */
        }
        #loopCount { font-size: 1.5em; color: #fff; }

        .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 1em; margin-top: 20px; cursor: pointer; }
        .btn-main.active { background: #f44336; }
        .btn-capture { background: #444; padding: 10px; font-size: 0.75em; margin-top: 5px; border-radius: 8px; border: none; color: white; width: 100%; }
        .status-box { font-size: 0.85em; text-align: center; margin-top: 20px; color: #777; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <h2 style="text-align: center; margin-top: 0; color: var(--primary);">Murottal Looper</h2>
        
        <!-- Display Counter -->
        <div id="counterDisplay" class="counter-badge">
            Jumlah Pengulangan: <br>
            <span id="loopCount">0</span>
        </div>

        <div class="form-group">
            <label>Pilih Surah:</label>
            <select id="surahSelect">
                <option value="">-- Pilih Surah --</option>
                <option value="https://dl.dropboxusercontent.com/scl/fi/jtyfu1d0dmf2uheigls3o/Surah-Ibrahim.mp4?rlkey=e2y8qty9unrz3z60zdt5p899h">Surah Ibrahim</option>
                <option value="https://dl.dropboxusercontent.com/scl/fi/7kc3xntfc6b9txzrq7rov/Surah-Maryam.mp4?rlkey=59mr2hou1wo34bm071n81xf2i">Surah Maryam</option>
                <option value="https://dl.dropboxusercontent.com/scl/fi/uda474ifxtnufq3eoeuai/Surah-Thaha.mp4?rlkey=ohpxsp70de5jjnrpskqxy24vf">Surah Thaha</option>
            </select>
        </div>

        <div id="videoWrapper">
            <video id="player" controls playsinline preload="auto" crossorigin="anonymous">
                <source src="" type="video/mp4">
                    Browser tidak mendukung video.
            </video>
        </div>

        <div class="time-grid">
            <div>
                <label>Mulai Loop:</label>
                <input type="text" id="startTime" value="00:00">
                <button class="btn-capture" onclick="captureTime('startTime')">Ambil Menit Ini</button>
            </div>
            <div>
                <label>Selesai Loop:</label>
                <input type="text" id="endTime" value="00:10">
                <button class="btn-capture" onclick="captureTime('endTime')">Ambil Menit Ini</button>
            </div>
        </div>

        <button class="btn-main" id="btnToggle">AKTIFKAN REPEAT</button>
        <div class="status-box" id="statusDisplay">Pilih surah untuk memulai</div>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    const wrapper = document.getElementById('videoWrapper');
    const surahSelect = document.getElementById('surahSelect');
    const btnToggle = document.getElementById('btnToggle');
    const loopCountDisplay = document.getElementById('loopCount');
    const counterDisplay = document.getElementById('counterDisplay');
    
    let isRepeatActive = false;
    let count = 0; // Variable penghitung

    // Fungsi ganti surah
    surahSelect.addEventListener('change', function() {
        const url = this.value;
        if (url) {
            let cleanUrl = url.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
            
            player.src = cleanUrl;
            wrapper.style.display = "block";
            counterDisplay.style.display = "block"; // Tampilkan counter
            
            resetCounter(); // Reset angka ke 0 saat ganti surah
            player.load(); 
            stopRepeat();
        } else {
            wrapper.style.display = "none";
            counterDisplay.style.display = "none";
            player.pause();
        }
    });

    function resetCounter() {
        count = 0;
        loopCountDisplay.innerText = count;
    }

    function timeToSeconds(str) {
        const p = str.split(':');
        let s = 0, m = 1;
        while (p.length > 0) {
            s += m * parseInt(p.pop(), 10);
            m *= 60;
        }
        return s;
    }

    function secondsToTime(secs) {
        const m = Math.floor(secs / 60);
        const s = Math.floor(secs % 60);
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function captureTime(targetId) {
        document.getElementById(targetId).value = secondsToTime(player.currentTime);
    }

    function stopRepeat() {
        isRepeatActive = false;
        player.pause();
        updateUI();
    }

    btnToggle.addEventListener('click', () => {
        if (!player.src || player.src.includes('index.html')) return alert("Pilih surah dulu!");

        if (!isRepeatActive) {
            const start = timeToSeconds(document.getElementById('startTime').value);
            const end = timeToSeconds(document.getElementById('endTime').value);

            if (end <= start) return alert("Waktu selesai harus lebih besar!");

            isRepeatActive = true;
            player.currentTime = start;
            player.play().catch(e => console.log("Autoplay dicegah browser, silakan klik play manual"));
        } else {
            stopRepeat();
        }
        updateUI();
    });

    function updateUI() {
        btnToggle.innerText = isRepeatActive ? "HENTIKAN REPEAT" : "AKTIFKAN REPEAT";
        btnToggle.style.background = isRepeatActive ? "#f44336" : "#4caf50";
    }

    player.addEventListener('timeupdate', () => {
        if (!isRepeatActive) return;
        const start = timeToSeconds(document.getElementById('startTime').value);
        const end = timeToSeconds(document.getElementById('endTime').value);
        
        if (player.currentTime >= end) {
            player.currentTime = start;
            player.play();
            
            // Tambah hitungan setiap kali loop terjadi
            count++;
            loopCountDisplay.innerText = count;
        }
    });
</script>

</body>
</html>
